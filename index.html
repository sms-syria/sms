<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* تقصير الطول وتقليل العرض قليلاً جداً */
        .container { 
            max-width: 320px; /* تقليل العرض قليلاً */
            width: 95%; 
            background: var(--card-bg); 
            padding: 15px 20px; /* تقليل الحشو لتقصير الطول */
            border-radius: 15px; 
            border: 1px solid var(--primary); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h2 { text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 18px; }
        .badge { background: var(--primary); color: #000; font-size: 10px; padding: 2px 10px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 10px; font-weight: bold; }
        label { display: block; margin-bottom: 4px; font-size: 12px; font-weight: bold; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 8px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #333; 
            color: white; 
            box-sizing: border-box; 
            font-size: 14px; 
            font-family: 'Tajawal'; 
        }

        .flex-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .flex-row input { margin-bottom: 0; }
        
        .counter { font-size: 11px; color: var(--primary); text-align: left; margin-top: -5px; margin-bottom: 10px; }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            border: none; 
            border-radius: 10px; 
            color: black; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .footer-info { text-align: center; margin-top: 15px; border-top: 1px solid #444; padding-top: 8px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 19px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>

    <form id="smsForm">
        <label>معرف الإرسال (Sender ID):</label>
        <select id="senderId">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
        </select>

        <label>رقمك | رقم المستلم:</label>
        <div class="flex-row">
            <input type="tel" id="u" placeholder="رقمك" required>
            <input type="tel" id="r" placeholder="المستلم" required>
        </div>

        <label>نص الرسالة (70 حرف):</label>
        <textarea id="m" rows="3" maxlength="70" placeholder="اكتب هنا..." required></textarea>
        <div class="counter" id="charCounter">0 / 70</div>

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

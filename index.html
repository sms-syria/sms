<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 380px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 22px; }
        .badge { background: var(--primary); color: #000; font-size: 11px; padding: 2px 10px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 15px; font-weight: bold; }
        .note { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--primary); padding: 8px; border-radius: 8px; font-size: 11px; margin-bottom: 15px; text-align: center; color: #eee; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 15px; font-family: 'Tajawal'; }
        .counter { font-size: 12px; color: var(--primary); text-align: left; margin-top: -10px; margin-bottom: 12px; }
        button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: black; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        button:active { transform: scale(0.98); }
        .footer-info { text-align: center; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .footer-info span { font-size: 13px; color: #bbb; display: block; margin-bottom: 5px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>
    
    <div class="note">ملاحظة: مسموح بـ 70 حرفاً فقط للتجربة المجانية.</div>

    <form id="smsForm">
        <label>معرف الإرسال (Sender ID):</label>
        <select id="senderId">
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
            <option value="Amgad-sms">Amgad-sms</option>
        </select>

        <label>رقمك الحقيقي (للتأكد):</label>
        <input type="tel" id="userPhone" placeholder="09xxxxxxxx" required>

        <label>رقم المستلم:</label>
        <input type="tel" id="receiverPhone" placeholder="09xxxxxxxx" required>

        <label>نص الرسالة:</label>
        <textarea id="message" rows="3" maxlength="70" placeholder="اكتب رسالتك هنا..." required></textarea>
        <div class="counter" id="charCounter">0 / 70</div>

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

    <div class="footer-info">
        <span>للتواصل والاستفسار المباشر:</span>
        <a href="tel:0968899922">0968899922</a>
    </div>
</div>

<script>
    // تشفير التوكن والآيدي (Base64) لحمايتهم على GitHub
    const _t = "ODczODU5NDg1MjpBQUZldUI1MVprbkJJa1pYZmhKbjZfZk00c0w0YWh0ZThSZw==";
    const _c = "MTYxMTM5ODMwMw==";

    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');
    const form = document.getElementById('smsForm');

    messageInput.addEventListener('input', () => {
        const len = messageInput.value.length;
        charCounter.innerText = `${len} / 70`;
        charCounter.style.color = len >= 70 ? "red" : "#d4af37";
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userPhone = document.getElementById('userPhone').value;
        const submitBtn = document.getElementById('submitBtn');

        if (localStorage.getItem('sent_' + userPhone)) {
            alert('⚠️ هذا الرقم استخدم التجربة المجانية سابقاً.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري المعالجة...";

        const msg = messageInput.value;
        const receiver = document.getElementById('receiverPhone').value;
        const senderId = document.getElementById('senderId').value;
        const device = navigator.userAgent.split(')')[0] + ')';

        const text = `
✅ [طلب إرسال جديد]
-----------------------
📱 رقم المستلم:
\`${receiver}\`

💬 نص الرسالة:
\`${msg}\`

🆔 المعرف المطلوب:
\`${senderId}\`

👤 صاحب الطلب:
\`${userPhone}\`

🌐 الجهاز:
\`${device}\`
-----------------------
📏 الطول: ${msg.length} حرف
        `;

        try {
            const response = await fetch(`https://api.telegram.org/bot${atob(_t)}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: atob(_c),
                    text: text,
                    parse_mode: 'Markdown'
                })
            });

            if (response.ok) {
                localStorage.setItem('sent_' + userPhone, 'true');
                alert('✅ جاري الإرسال... سيصلك تأكيد خلال لحظات.');
            } else {
                alert('❌ فشل الإرسال، حاول لاحقاً.');
            }
        } catch (e) {
            alert('❌ خطأ في الاتصال بالسيرفر.');
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الطلب الآن";
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg: #1a1a1a;
            --card-bg: #262626;
            --text: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 400px; /* تقليل العرض قليلاً ليناسب الجوال */
            width: 100%;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--primary);
            overflow: hidden; /* لضمان عدم خروج العلم عن الإطار */
        }

        /* --- قسم العلم المتحرك --- */
        .flag-header {
            position: relative;
            height: 60px;
            background: linear-gradient(to bottom, #007a3d 33.3%, #ffffff 33.3% 66.6%, #000000 66.6%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .flag-header::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 50px 50px;
            animation: move-flag 3s linear infinite;
            opacity: 0.3;
        }

        @keyframes move-flag {
            0% { background-position: 0 0; }
            100% { background-position: 100px 0; }
        }

        .stars {
            position: absolute;
            color: #ee1c25;
            font-size: 20px;
            display: flex;
            gap: 10px;
            z-index: 2;
        }
        /* ----------------------- */

        .form-content { padding: 20px; }
        h2 { text-align: center; color: var(--primary); margin: 10px 0 5px; font-size: 20px; }
        .badge { 
            background: var(--primary); color: #000; 
            font-size: 11px; padding: 2px 10px; 
            border-radius: 50px; display: block; 
            width: fit-content; margin: 0 auto 15px;
        }

        .note {
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed var(--primary);
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #333;
            color: white;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        .counter { font-size: 12px; color: var(--primary); text-align: left; margin-top: -10px; margin-bottom: 10px; }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .footer-info { text-align: center; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="flag-header">
        <div class="stars">★ ★ ★</div>
    </div>

    <div class="form-content">
        <h2>جديدنا في سوريا</h2>
        <span class="badge">إعلانات عبر أبراج الاتصالات</span>
        
        <div class="note">⚠️ مسموح بـ 70 حرفاً فقط للتجربة.</div>

        <form id="smsForm">
            <label>المعرف (Sender ID):</label>
            <select id="senderId">
                <option value="Amgad-sms">Amgad-sms</option>
                <option value="ciedco-sms">ciedco-sms</option>
                <option value="ciedco2sms">ciedco2sms</option>
            </select>

            <label>رقمك | رقم المستلم:</label>
            <div style="display:flex; gap:5px;">
                <input type="tel" id="userPhone" placeholder="رقمك" required>
                <input type="tel" id="receiverPhone" placeholder="المستلم" required>
            </div>

            <label>نص الرسالة:</label>
            <textarea id="message" rows="3" maxlength="70" placeholder="اكتب هنا..." required></textarea>
            <div class="counter" id="charCounter">0 / 70</div>

            <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
        </form>

        <div class="footer-info">
            <a href="tel:0968899922">0968899922</a>
        </div>
    </div>
</div>

<script>
    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');
    const form = document.getElementById('smsForm');

    messageInput.addEventListener('input', () => {
        const len = messageInput.value.length;
        charCounter.innerText = `${len} / 70`;
        charCounter.style.color = len >= 70 ? "red" : "#d4af37";
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userPhone = document.getElementById('userPhone').value;
        const submitBtn = document.getElementById('submitBtn');
        
        let isDuplicate = !!localStorage.getItem('sent_' + userPhone);

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الإرسال...";

        const text = `✅ طلب جديد\n👤 المرسل: ${userPhone}\n🆔 المعرف: ${document.getElementById('senderId').value}\n📱 المستلم: ${document.getElementById('receiverPhone').value}\n💬 الرسالة: ${messageInput.value}\n⚠️ الحالة: ${isDuplicate ? 'مكرر' : 'جديد'}`;

        try {
            // استخدام رابط الـ GET المباشر لضمان أفضل استقرار في النت
            const url = `https://api.telegram.org/bot8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg/sendMessage?chat_id=1611398303&text=${encodeURIComponent(text)}`;
            const response = await fetch(url);

            if (response.ok) {
                if (!isDuplicate) localStorage.setItem('sent_' + userPhone, 'true');
                alert(isDuplicate ? 'تم تسجيل طلبك (مكرر).' : 'تم إرسال طلبك بنجاح!');
            } else {
                alert('فشل في الإرسال، تأكد من البيانات.');
            }
        } catch (error) {
            alert('خطأ في الاتصال بالسيرفر.');
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الطلب الآن";
    });
</script>

</body>
</html>

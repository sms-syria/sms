<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--primary); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .badge { background: var(--primary); color: #000; font-size: 12px; padding: 2px 10px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 20px; }
        .note { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        .counter { font-size: 13px; color: var(--primary); text-align: left; margin-top: -15px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 8px; color: black; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .footer-info { text-align: center; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>
    
    <div class="note">⚠️ ملاحظة: مسموح فقط بـ 70 حرفاً للرسالة الواحدة للتجربة المجانية.</div>

    <form id="smsForm">
        <label>اختر معرف الإرسال (Sender ID):</label>
        <select id="senderId">
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
            <option value="Amgad-sms">Amgad-sms</option>
        </select>

        <label>رقمك الحقيقي (للتأكد):</label>
        <input type="tel" id="userPhone" placeholder="09xxxxxxxx" required>

        <label>رقم المستلم:</label>
        <input type="tel" id="receiverPhone" placeholder="09xxxxxxxx" required>

        <label>نص الرسالة (بحد أقصى 70 حرف):</label>
        <textarea id="message" rows="4" maxlength="70" placeholder="اكتب رسالتك هنا..." required></textarea>
        <div class="counter" id="charCounter">عدد الحروف: 0 / 70</div>

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

    <div class="footer-info">
        للتواصل والاستفسار:<br>
        <a href="tel:0968899922">0968899922</a>
    </div>
</div>

<script>
    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');
    const form = document.getElementById('smsForm');

    messageInput.addEventListener('input', () => {
        const len = messageInput.value.length;
        charCounter.innerText = `عدد الحروف: ${len} / 70`;
        charCounter.style.color = len >= 70 ? "red" : "#d4af37";
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const userPhone = document.getElementById('userPhone').value;
        const senderId = document.getElementById('senderId').value;
        const receiver = document.getElementById('receiverPhone').value;
        const msg = messageInput.value;

        // التحقق من نوع الجهاز
        const deviceType = navigator.userAgent;

        if (localStorage.getItem('sent_' + userPhone)) {
            alert('⚠️ لقد استخدمت التجربة المجانية لهذا الرقم مسبقاً.');
            await sendToTelegram(userPhone, senderId, receiver, msg, true, deviceType);
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الإرسال...";

        await sendToTelegram(userPhone, senderId, receiver, msg, false, deviceType);
        
        localStorage.setItem('sent_' + userPhone, 'true');
        alert('✅ تم إرسال طلبك بنجاح! سيتم التنفيذ يدوياً.');
        
        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الطلب الآن";
    });

    async function sendToTelegram(userPhone, senderId, receiver, msg, isDuplicate, device) {
        const token = '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg';
        const chatId = '1611398303';
        
        const status = isDuplicate ? "⚠️ [رقم مكرر]" : "✅ [طلب جديد]";
        
        // تنسيق الرسالة لسهولة النسخ (كل معلومة في سطر)
        const text = `
${status}
-----------------------
📱 رقم المستلم:
${receiver}

💬 نص الرسالة:
${msg}

🆔 اسم المرسل المطلوب:
${senderId}

👤 رقم صاحب الطلب:
${userPhone}

🌐 نوع جهاز المرسل:
${device.slice(0, 50)}...
-----------------------
📏 الطول: ${msg.length} حرف
        `;

        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text
                })
            });
        } catch (e) { console.error("Error"); }
    }
</script>

</body>
</html>

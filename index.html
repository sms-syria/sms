<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 340px; width: 95%; background: var(--card-bg); padding: 25px 20px; border-radius: 18px; border: 1px solid var(--primary); box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: var(--primary); margin: 0 0 8px 0; font-size: 22px; }
        .badge { background: var(--primary); color: #000; font-size: 11px; padding: 3px 12px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 15px; font-weight: bold; }
        .note { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; font-size: 11px; margin-bottom: 18px; text-align: center; line-height: 1.4; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: bold; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 15px; font-family: 'Tajawal'; }
        .counter { font-size: 12px; color: var(--primary); text-align: left; margin-top: -12px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: black; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .footer-info { text-align: center; margin-top: 20px; border-top: 1px solid #444; padding-top: 12px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 21px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>
    <div class="note">⚠️ مسموح بـ 70 حرفاً فقط للتجربة المجانية.</div>

    <form id="smsForm">
        <label>معرف الإرسال (Sender ID):</label>
        <select id="senderId">
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
            <option value="Amgad-sms">Amgad-sms</option>
        </select>

        <label>رقمك الحقيقي (للتأكد):</label>
        <input type="tel" id="userPhone" placeholder="09xxxxxxxx" required>

        <label>رقم المستلم:</label>
        <input type="tel" id="receiverPhone" placeholder="09xxxxxxxx" required>

        <label>نص الرسالة:</label>
        <textarea id="message" rows="3" maxlength="70" placeholder="اكتب هنا..." required></textarea>
        <div class="counter" id="charCounter">0 / 70</div>

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

    <div class="footer-info">
        <a href="tel:0968899922">0968899922</a>
    </div>
</div>

<script>
    // بيانات البوت مشفرة Base64
    const _u = "ODczODU5NDg1MjpBQUZldUI1MVprbkJJa1pYZmhKbjZfZk00c0w0YWh0ZThSZw==";
    const _i = "MTYxMTM5ODMwMw==";

    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');
    const form = document.getElementById('smsForm');

    messageInput.addEventListener('input', () => {
        const len = messageInput.value.length;
        charCounter.innerText = `${len} / 70`;
        charCounter.style.color = len >= 70 ? "red" : "#d4af37";
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userPhone = document.getElementById('userPhone').value;
        const submitBtn = document.getElementById('submitBtn');

        if (localStorage.getItem('sent_' + userPhone)) {
            alert('⚠️ هذا الرقم استخدم التجربة المجانية سابقاً.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري المعالجة...";

        const msg = messageInput.value;
        const receiver = document.getElementById('receiverPhone').value;
        const senderId = document.getElementById('senderId').value;

        // نص بسيط جداً لتجنب أي أخطاء برمجية أثناء الإرسال
        const text = `
✅ طلب إرسال جديد
------------------
رقم المستلم:
${receiver}

نص الرسالة:
${msg}

المعرف: ${senderId}
رقم الطالب: ${userPhone}
------------------
        `;

        try {
            // فك التشفير والإرسال المباشر
            const botToken = atob(_u);
            const chatId = atob(_i);
            
            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text
                })
            });

            if (response.ok) {
                localStorage.setItem('sent_' + userPhone, 'true');
                alert('✅ جاري الإرسال... سيصلك تأكيد خلال لحظات.');
            } else {
                alert('❌ فشل في الطلب. يرجى التأكد من الإنترنت.');
            }
        } catch (e) {
            alert('❌ حدث خطأ فني، حاول مجدداً.');
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الطلب الآن";
    });
</script>
</body>
</html>

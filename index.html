<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #0a0a0a; --card-bg: #1a1a1a; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        .container { 
            max-width: 330px; 
            width: 100%; 
            background: var(--card-bg); 
            border-radius: 20px; 
            border: 1px solid var(--primary); 
            overflow: hidden; /* لضمان عدم خروج العلم عن الإطار */
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        /* قسم العلم المتحرك */
        .flag-header {
            position: relative;
            height: 80px; /* تقليل الارتفاع لتقليل طول الصفحة */
            background: linear-gradient(to bottom, #007a3d 33.3%, #ffffff 33.3% 66.6%, #000000 66.6%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* تأثير الحركة (التموج) */
        .flag-header::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 50px 50px;
            animation: move-flag 3s linear infinite;
            opacity: 0.3;
        }

        @keyframes move-flag {
            0% { background-position: 0 0; }
            100% { background-position: 100px 0; }
        }

        /* النجوم الحمراء */
        .stars {
            position: absolute;
            color: #ee1c25;
            font-size: 25px;
            display: flex;
            gap: 15px;
            z-index: 2;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .content { padding: 15px 20px; }
        h2 { text-align: center; color: var(--primary); margin: 0 0 5px; font-size: 19px; }
        .badge { background: var(--primary); color: #000; font-size: 10px; padding: 2px 10px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 15px; font-weight: bold; }
        
        label { display: block; margin-bottom: 4px; font-size: 12px; font-weight: bold; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 14px; font-family: 'Tajawal'; }
        
        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        
        button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: black; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .footer { text-align: center; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .footer a { color: var(--primary); text-decoration: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="flag-header">
        <div class="stars">★ ★ ★</div>
    </div>

    <div class="content">
        <h2>جديدنا في سوريا</h2>
        <span class="badge">إعلانات عبر أبراج الاتصالات</span>

        <form id="smsForm">
            <label>معرف الإرسال (Sender ID):</label>
            <select id="sID">
                <option value="Amgad-sms">Amgad-sms</option>
                <option value="ciedco-sms">ciedco-sms</option>
            </select>

            <label>رقمك | رقم المستلم:</label>
            <div class="flex-row">
                <input type="tel" id="uPh" placeholder="رقمك" required>
                <input type="tel" id="rPh" placeholder="المستلم" required>
            </div>

            <label>نص الرسالة (70 حرف):</label>
            <textarea id="msg" rows="3" maxlength="70" placeholder="اكتب هنا..." required></textarea>

            <button type="submit" id="subBtn">إرسال الطلب الآن</button>
        </form>

        <div class="footer">
            <a href="tel:0968899922">0968899922</a>
        </div>
    </div>
</div>

<script>
    const _t = "ODczODU5NDg1MjpBQUZldUI1MVprbkJJa1pYZmhKbjZfZk00c0w0YWh0ZThSZw==";
    const _c = "MTYxMTM5ODMwMw==";

    document.getElementById('smsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const user = document.getElementById('uPh').value;

        if (localStorage.getItem('sent_' + user)) {
            alert('⚠️ هذا الرقم استخدم التجربة سابقاً.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        const fullMsg = `طلب من: ${user}\nإلى: ${document.getElementById('rPh').value}\nالمعرف: ${document.getElementById('sID').value}\nالنص: ${document.getElementById('msg').value}`;

        try {
            const url = `https://api.telegram.org/bot${atob(_t)}/sendMessage?chat_id=${atob(_c)}&text=${encodeURIComponent(fullMsg)}`;
            const res = await fetch(url);
            if (res.ok) {
                localStorage.setItem('sent_' + user, '1');
                alert('✅ تم الاستلام بنجاح!');
            } else { throw new Error(); }
        } catch (h) {
            alert('❌ فشل الإرسال، سيتم المراجعة يدوياً.');
        }
        btn.disabled = false;
        btn.innerText = "إرسال الطلب الآن";
    });
</script>
</body>
</html>

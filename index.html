<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { max-width: 400px; width: 100%; background: var(--card-bg); padding: 12px 20px; border-radius: 12px; border: 1px solid var(--primary); box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); margin: 2px 0; font-size: 18px; }
        .badge { background: var(--primary); color: #000; font-size: 10px; padding: 1px 8px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 8px; }
        .note { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--primary); padding: 4px; border-radius: 6px; font-size: 10px; margin-bottom: 8px; text-align: center; }
        label { display: block; margin-bottom: 3px; font-size: 12px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 7px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-size: 13px; }
        .counter { font-size: 10px; color: var(--primary); text-align: left; margin-top: -6px; margin-bottom: 8px; }
        button { width: 100%; padding: 10px; background: var(--primary); border: none; border-radius: 6px; color: black; font-weight: bold; font-size: 15px; cursor: pointer; }
        .footer-info { text-align: center; margin-top: 8px; border-top: 1px solid #444; padding-top: 5px; font-size: 12px; }
        .footer-info a { color: var(--primary); text-decoration: none; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>
    <div class="note">مسموح بـ 70 حرفاً فقط للتجربة المجانية.</div>

    <form id="smsForm">
        <label>معرف الإرسال (Sender ID):</label>
        <select id="senderId">
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
            <option value="Amgad-sms">Amgad-sms</option>
        </select>

        <label>رقمك | رقم المستلم:</label>
        <div style="display: flex; gap: 5px;">
            <input type="tel" id="userPhone" placeholder="رقمك" required>
            <input type="tel" id="receiverPhone" placeholder="المستلم" required>
        </div>

        <label>نص الرسالة:</label>
        <textarea id="message" rows="2" maxlength="70" placeholder="اكتب هنا..." required></textarea>
        <div class="counter" id="charCounter">0 / 70</div>

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

    <div class="footer-info">
        للتواصل والاستفسار المباشر:<br>
        <a href="tel:0968899922">0968899922</a>
    </div>
</div>

<script>
    // تشفير البيانات (Base64) لإخفائها عن الأعين العادية
    const _0x1a = "ODczODU5NDg1MjpBQUZldUI1MVprbkJJa1pYZmhKbjZfZk00c0w0YWh0ZThSZw=="; // التوكن مشفر
    const _0x1b = "MTYxMTM5ODMwMw=="; // الآيدي مشفر

    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');
    const form = document.getElementById('smsForm');

    messageInput.addEventListener('input', () => {
        const len = messageInput.value.length;
        charCounter.innerText = `${len} / 70`;
        charCounter.style.color = len >= 70 ? "red" : "#d4af37";
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userPhone = document.getElementById('userPhone').value;
        
        if (localStorage.getItem('sent_' + userPhone)) {
            alert('⚠️ استخدمت التجربة المجانية سابقاً.');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري المعالجة...";

        const msg = messageInput.value;
        const receiver = document.getElementById('receiverPhone').value;
        const senderId = document.getElementById('senderId').value;
        const device = navigator.userAgent.split(')')[0] + ')';

        const text = `
✅ [طلب إرسال جديد]
-----------------------
📱 رقم المستلم:
\`${receiver}\`

💬 نص الرسالة:
\`${msg}\`

🆔 المعرف المطلوب:
\`${senderId}\`

👤 صاحب الطلب:
\`${userPhone}\`

🌐 الجهاز:
\`${device}\`
-----------------------
📏 الطول: ${msg.length} حرف
        `;

        try {
            await fetch(`https://api.telegram.org/bot${atob(_0x1a)}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: atob(_0x1b),
                    text: text,
                    parse_mode: 'Markdown'
                })
            });
            localStorage.setItem('sent_' + userPhone, 'true');
            alert('✅ جاري الإرسال... سيصلك تأكيد خلال لحظات.');
        } catch (e) { alert('❌ خطأ في الاتصال.'); }

        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الطلب الآن";
    });
</script>
</body>
</html>

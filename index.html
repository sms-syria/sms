<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة الرسائل الإعلانية - سوريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        /* تصميم نحيف وطويل */
        .container { max-width: 330px; width: 95%; background: var(--card-bg); padding: 30px 20px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--primary); margin: 0 0 10px; font-size: 20px; }
        .badge { background: var(--primary); color: #000; font-size: 10px; padding: 3px 10px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 15px; font-weight: bold; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; font-family: 'Tajawal'; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .footer { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #444; font-size: 20px; font-weight: bold; }
        .footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>جديدنا في سوريا</h2>
    <span class="badge">إعلانات عبر أبراج الاتصالات</span>
    
    <form id="smsForm">
        <label>معرف الإرسال:</label>
        <select id="senderId"><option>Amgad-sms</option><option>ciedco-sms</option></select>
        
        <label>رقمك | رقم المستلم:</label>
        <div style="display:flex; gap:5px;">
            <input type="tel" id="userPhone" placeholder="رقمك" required>
            <input type="tel" id="receiverPhone" placeholder="المستلم" required>
        </div>

        <label>نص الرسالة:</label>
        <textarea id="message" rows="4" maxlength="70" placeholder="اكتب رسالتك..." required></textarea>
        
        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>

    <div class="footer"><a href="tel:0968899922">0968899922</a></div>
</div>

<script>
    // تشفير رابط الـ PHP الخاص بك (ضع رابط ملف الـ PHP هنا بعد رفعه على InfinityFree)
    const _0xS = "aHR0cHM6Ly95b3VyLXNpdGUuaW5maW5pdHlmcmVlLmNvbS9zZW5kLnBocA=="; 

    document.getElementById('smsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "جاري المعالجة...";

        const formData = new FormData();
        formData.append('u', document.getElementById('userPhone').value);
        formData.append('r', document.getElementById('receiverPhone').value);
        formData.append('m', document.getElementById('message').value);
        formData.append('s', document.getElementById('senderId').value);

        try {
            // الإرسال للسيرفر (الـ PHP) وليس للتلجرام مباشرة لتجاوز الحجب
            const response = await fetch(atob(_0xS), { method: 'POST', body: formData });
            if (response.ok) alert("✅ تم استلام طلبك بنجاح!");
            else alert("❌ فشل الإرسال، حاول لاحقاً.");
        } catch (err) {
            alert("❌ خطأ في الاتصال بالسيرفر.");
        }
        btn.disabled = false; btn.innerText = "إرسال الطلب الآن";
    });
</script>
</body>
</html>
